name: Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore korp_Teste_RuanAlexandre.sln

      - name: Build da solução
        run: dotnet build korp_Teste_RuanAlexandre.sln --no-restore -c Release

      - name: Executar testes unitários
        run: dotnet test korp_Teste_RuanAlexandre.sln --no-build -c Release --verbosity normal

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: KorpApp/package-lock.json

      - name: Instalar dependências
        working-directory: KorpApp
        run: npm ci

      - name: Build do Angular
        working-directory: KorpApp
        run: npm run build -- --configuration production